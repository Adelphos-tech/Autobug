<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBug — Partner Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #f8fafc;
            --primary: #167a3f;          /* Adelphos Green */
            --primary-dark: #0f512a;
            --primary-light: rgba(22, 122, 63, 0.06);
            --primary-glow: rgba(22, 122, 63, 0.15);
            --text-main: #334155;
            --text-muted: #64748b;
            --text-heading: #0f172a;
            --error: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.05);
            --shadow-premium: 0 20px 50px rgba(15, 23, 42, 0.08);
            --radius-md: 16px;
            --radius-lg: 24px;
            --font-main: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: #f1f5f9;
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative Background Gradients */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 10% 20%, rgba(22, 122, 63, 0.06) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(204, 160, 40, 0.04) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: var(--radius-lg);
            padding: 45px 40px;
            box-shadow: var(--shadow-premium);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            gap: 6px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.02);
        }

        .logo-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-heading);
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .powered-by {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .powered-by img {
            height: 22px;
            object-fit: contain;
            display: inline-block;
            margin-top: -1px;
        }

        .login-header h1 {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text-heading);
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Forms */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-heading);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px;
            font-size: 0.95rem;
            font-family: var(--font-main);
            color: var(--text-heading);
            background-color: #f8fafc;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            background-color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .form-input.has-error {
            border-color: var(--error);
            background-color: #fffafb;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 50%;
            transition: color 0.2s ease, background-color 0.2s;
        }

        .password-toggle:hover {
            color: var(--primary);
            background-color: rgba(22, 122, 63, 0.05);
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
        }

        /* Remember Me & Forgot Password */
        .form-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            font-size: 0.88rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.98rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(22, 122, 63, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--primary-dark);
            box-shadow: 0 6px 16px rgba(22, 122, 63, 0.25);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background-color: var(--text-muted);
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Alert styling */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            margin-bottom: 22px;
            display: none;
            align-items: flex-start;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        .alert-error {
            background-color: #fef2f2;
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: #b91c1c;
        }

        /* Shaking animation on error */
        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer Link */
        .login-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Lockout styling */
        .lockout-state {
            text-align: center;
            padding: 20px 0;
        }

        .lockout-timer {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--error);
            margin: 15px 0;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="login-container" id="loginContainer">
        <div class="login-header">
            <a href="/" class="logo">
                <div class="logo-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" width="220" height="35" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: block; width: 220px; height: 35px; flex-shrink: 0;">
                      <defs>
                        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                          <stop offset="0%" stop-color="#C5E0BF" />
                          <stop offset="50%" stop-color="#82C4AE" />
                          <stop offset="100%" stop-color="#487ba3" />
                        </linearGradient>
                      </defs>
                      <!-- Minimalist Geometric Bug Icon -->
                      <g stroke="url(#logo-grad)" stroke-width="2.2">
                        <!-- Antennae (forming a beautiful top circle) -->
                        <path d="M 28 16 C 20 16 18 6 27 5" />
                        <path d="M 32 16 C 40 16 42 6 33 5" />
                        <!-- Antennae Tips (Dots) -->
                        <circle cx="27" cy="5" r="1.5" fill="url(#logo-grad)" stroke="none" />
                        <circle cx="33" cy="5" r="1.5" fill="url(#logo-grad)" stroke="none" />
                        <!-- Head -->
                        <circle cx="30" cy="18" r="3.5" fill="url(#logo-grad)" fill-opacity="0.12" />
                        <!-- Body (Perfect Circle) -->
                        <circle cx="30" cy="34" r="12" fill="url(#logo-grad)" fill-opacity="0.12" />
                        <!-- Center Split Line -->
                        <path d="M 30 22 L 30 46" />
                        <!-- Inner loop (filament) -->
                        <path d="M 25 30 C 25 38 35 38 35 30" stroke="#ffffff" stroke-width="1.6" />
                        <!-- Legs (6 short ticks) -->
                        <path d="M 19 28 Q 14 26 12 22" />
                        <path d="M 18 34 H 10" />
                        <path d="M 19 40 Q 14 42 12 46" />
                        <path d="M 41 28 Q 46 26 48 22" />
                        <path d="M 42 34 H 50" />
                        <path d="M 41 40 Q 46 42 48 46" />
                      </g>
                      <!-- Text: AUTO3UG -->
                      <g stroke="url(#logo-grad)" stroke-width="2.8">
                        <!-- A -->
                        <path d="M 75 48 L 90 12 L 105 48" />
                        <!-- U -->
                        <path d="M 117 12 V 33 A 15 15 0 0 0 147 33 V 12" />
                        <!-- T -->
                        <path d="M 159 12 H 189 M 174 12 V 48" />
                        <!-- O -->
                        <circle cx="219" cy="30" r="18" />
                        <!-- B (Stylized 3) -->
                        <path d="M 249 18 C 249 12 279 12 279 22 C 279 29 261 29 261 30 C 261 30 279 31 279 38 C 279 48 249 48 249 42" />
                        <!-- U -->
                        <path d="M 291 12 V 33 A 15 15 0 0 0 321 33 V 12" />
                        <!-- G -->
                        <path d="M 367 21 A 18 18 0 1 0 367 39 V 30 H 351" />
                      </g>
                    </svg>
                </div>
                <div class="powered-by">
                    <span>powered by</span>
                    <img src="logo.png" alt="Adelphos Tech">
                </div>
            </a>
            <h1 id="headerTitle">Welcome Back</h1>
            <p id="headerSubtitle">Sign in to your client or admin portal</p>
        </div>

        <div id="alertBox" class="alert alert-error">
            <svg style="width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <span id="alertMsg">Invalid email or password</span>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-input" placeholder="you@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="••••••••••••••••" required>
                    <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                        <!-- Eye Icon -->
                        <svg id="eyeIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-actions">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">
                <span>Sign In</span>
                <svg style="width: 18px; height: 18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                </svg>
            </button>
        </form>

        <div class="login-footer">
            Don't have a vendor account? <a href="/register">Register your company</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginContainer = document.getElementById('loginContainer');
        const alertBox = document.getElementById('alertBox');
        const alertMsg = document.getElementById('alertMsg');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeIcon = document.getElementById('eyeIcon');
        const rememberMe = document.getElementById('rememberMe');
        const btnSubmit = document.getElementById('btnSubmit');

        // Check if already logged in and token is valid
        const storedToken = localStorage.getItem('autobug_token');
        const storedUser = localStorage.getItem('autobug_user');
        if (storedToken && storedUser) {
            try {
                const user = JSON.parse(storedUser);
                // Verify JWT payload is not obviously expired (basic client-side check)
                const payload = JSON.parse(atob(storedToken.split('.')[1]));
                if (payload.exp * 1000 < Date.now()) {
                    throw new Error('Expired');
                }
                if (user.role === 'ADMIN') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/';
                }
            } catch (e) {
                // clear invalid data
                localStorage.removeItem('autobug_token');
                localStorage.removeItem('autobug_user');
            }
        }

        // Toggle password visibility
        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            
            // Toggle eye icon representation
            if (isPassword) {
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                `;
            } else {
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
            }
        });

        // Show/Hide Alert
        function showAlert(msg) {
            alertMsg.textContent = msg;
            alertBox.style.display = 'flex';
            loginContainer.classList.add('shake');
            setTimeout(() => {
                loginContainer.classList.remove('shake');
            }, 400);
        }

        function hideAlert() {
            alertBox.style.display = 'none';
        }

        // Lockout View helper
        let lockoutInterval = null;
        function enterLockout(seconds) {
            clearInterval(lockoutInterval);
            
            const originalContent = loginContainer.innerHTML;
            
            loginContainer.innerHTML = `
                <div class="login-header">
                    <div class="logo">
                        <div class="logo-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" width="220" height="35" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: block; width: 220px; height: 35px; flex-shrink: 0;">
                              <defs>
                                <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                                  <stop offset="0%" stop-color="#C5E0BF" />
                                  <stop offset="50%" stop-color="#82C4AE" />
                                  <stop offset="100%" stop-color="#487ba3" />
                                </linearGradient>
                              </defs>
                              <!-- Minimalist Geometric Bug Icon -->
                              <g stroke="url(#logo-grad)" stroke-width="2.2">
                                <!-- Antennae (forming a beautiful top circle) -->
                                <path d="M 28 16 C 20 16 18 6 27 5" />
                                <path d="M 32 16 C 40 16 42 6 33 5" />
                                <!-- Antennae Tips (Dots) -->
                                <circle cx="27" cy="5" r="1.5" fill="url(#logo-grad)" stroke="none" />
                                <circle cx="33" cy="5" r="1.5" fill="url(#logo-grad)" stroke="none" />
                                <!-- Head -->
                                <circle cx="30" cy="18" r="3.5" fill="url(#logo-grad)" fill-opacity="0.12" />
                                <!-- Body (Perfect Circle) -->
                                <circle cx="30" cy="34" r="12" fill="url(#logo-grad)" fill-opacity="0.12" />
                                <!-- Center Split Line -->
                                <path d="M 30 22 L 30 46" />
                                <!-- Inner loop (filament) -->
                                <path d="M 25 30 C 25 38 35 38 35 30" stroke="#ffffff" stroke-width="1.6" />
                                <!-- Legs (6 short ticks) -->
                                <path d="M 19 28 Q 14 26 12 22" />
                                <path d="M 18 34 H 10" />
                                <path d="M 19 40 Q 14 42 12 46" />
                                <path d="M 41 28 Q 46 26 48 22" />
                                <path d="M 42 34 H 50" />
                                <path d="M 41 40 Q 46 42 48 46" />
                              </g>
                              <!-- Text: AUTO3UG -->
                              <g stroke="url(#logo-grad)" stroke-width="2.8">
                                <!-- A -->
                                <path d="M 75 48 L 90 12 L 105 48" />
                                <!-- U -->
                                <path d="M 117 12 V 33 A 15 15 0 0 0 147 33 V 12" />
                                <!-- T -->
                                <path d="M 159 12 H 189 M 174 12 V 48" />
                                <!-- O -->
                                <circle cx="219" cy="30" r="18" />
                                <!-- B (Stylized 3) -->
                                <path d="M 249 18 C 249 12 279 12 279 22 C 279 29 261 29 261 30 C 261 30 279 31 279 38 C 279 48 249 48 249 42" />
                                <!-- U -->
                                <path d="M 291 12 V 33 A 15 15 0 0 0 321 33 V 12" />
                                <!-- G -->
                                <path d="M 367 21 A 18 18 0 1 0 367 39 V 30 H 351" />
                              </g>
                            </svg>
                        </div>
                        <div class="powered-by">
                            <span>powered by</span>
                            <img src="logo.png" alt="Adelphos Tech">
                        </div>
                    </div>
                    <h1 style="color: var(--error)">Portal Locked</h1>
                    <p>Too many failed attempts. Security cooldown active.</p>
                </div>
                <div class="lockout-state">
                    <div class="lockout-timer" id="timerValue">${seconds}s</div>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Please wait before trying again.</p>
                </div>
            `;
            
            let remaining = seconds;
            lockoutInterval = setInterval(() => {
                remaining--;
                const timerEl = document.getElementById('timerValue');
                if (timerEl) timerEl.textContent = `${remaining}s`;
                
                if (remaining <= 0) {
                    clearInterval(lockoutInterval);
                    window.location.reload();
                }
            }, 1000);
        }

        // Form Submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showAlert('Please fill in all fields.');
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.querySelector('span').textContent = 'Authenticating...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    btnSubmit.disabled = false;
                    btnSubmit.querySelector('span').textContent = 'Sign In';

                    if (response.status === 429) {
                        // Extract remaining seconds or default to 900 (15 min)
                        const match = data.error.match(/(\d+) seconds/);
                        const secs = match ? parseInt(match[1]) : 900;
                        enterLockout(secs);
                    } else {
                        showAlert(data.error || 'Authentication failed. Please check your credentials.');
                    }
                    return;
                }

                // Success! Store token & user info
                localStorage.setItem('autobug_token', data.token);
                localStorage.setItem('autobug_user', JSON.stringify(data.user));

                // Redirect based on role
                if (data.user.role === 'ADMIN') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/';
                }

            } catch (err) {
                console.error(err);
                btnSubmit.disabled = false;
                btnSubmit.querySelector('span').textContent = 'Sign In';
                showAlert('Network error. Unable to connect to the AutoBug server.');
            }
        });
    </script>
</body>
</html>
