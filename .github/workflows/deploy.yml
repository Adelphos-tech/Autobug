name: Deploy to Production Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPN Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (validate schema)
        env:
          DATABASE_URL: file:./dev.db
        run: npx prisma generate

      - name: Setup SSH key
        env:
          DEPLOY_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -H -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server via SCP
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          scp -i ~/.ssh/deploy_key -P "$PORT" -o StrictHostKeyChecking=no -r \
            src/ prisma/ package.json package-lock.json prisma.config.cjs \
            auto-dispatcher.js safe-auto-dispatcher.js prompt-generator.js \
            README.md .env.example .gitignore \
            "${SSH_USER}@${SSH_HOST}:/opt/autobug/"

      - name: Restart services on server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=no \
            "${SSH_USER}@${SSH_HOST}" << 'EOF'
            set -e
            cd /opt/autobug
            echo "Installing dependencies..."
            npm install --production
            echo "Generating Prisma client..."
            npx prisma generate
            echo "Restarting services..."
            systemctl restart autobug-server
            systemctl restart autobug-worker
            echo "Checking service status..."
            systemctl is-active autobug-server
            systemctl is-active autobug-worker
            echo "Deployment complete!"
          EOF
