name: Deploy to Production Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPN Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (validate schema)
        env:
          DATABASE_URL: file:./dev.db
        run: npx prisma generate

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server via SCP
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT || '22' }} -o StrictHostKeyChecking=no -r \
            src/ prisma/ package.json package-lock.json prisma.config.cjs \
            auto-dispatcher.js safe-auto-dispatcher.js prompt-generator.js \
            README.md .env.example .gitignore \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/autobug/

      - name: Restart services on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /opt/autobug
            echo "Installing dependencies..."
            npm install --production
            echo "Generating Prisma client..."
            npx prisma generate
            echo "Restarting services..."
            systemctl restart autobug-server
            systemctl restart autobug-worker
            echo "Checking service status..."
            systemctl is-active autobug-server
            systemctl is-active autobug-worker
            echo "Deployment complete!"
          EOF
